name: Deploy Production (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Production (Deploy Hook)
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL manquant — tentative via Vercel CLI ci-dessous."
            echo "Sinon : Vercel → Deployments → dernier build main → Promote to Production"
            exit 0
          fi
          echo "Déclenchement du déploiement Production Vercel…"
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Deploy Hook appelé avec succès."

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Deploy via Vercel CLI (fallback)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Secrets Vercel CLI absents — déploiement auto impossible depuis CI."
            echo "Le push sur main déclenche tout de même un build si le projet Vercel est lié à GitHub."
            exit 0
          fi
          npm ci
          npm run build
          npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          echo "Déploiement Vercel CLI terminé."
