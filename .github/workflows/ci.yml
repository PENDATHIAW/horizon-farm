name: Horizon Farm CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VITE_SUPABASE_URL: https://xmqfvmswrjhteaijnaxb.supabase.co
  VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtcWZ2bXN3cmpodGVhaWpuYXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTQ0NTcsImV4cCI6MjA5MzU5MDQ1N30.WR0rWE9I3fZJVzdt7UaOzgc_U4UHdsXAf5nsgt_n-7M
  VITE_HEY_HORIZON_LLM: auto

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run workflow unit tests
        run: PLAYWRIGHT_SKIP_WEBSERVER=1 npx playwright test tests/e2e/simulated-business-workflows.spec.js --reporter=line

      - name: Install Playwright browsers
        timeout-minutes: 5
        run: npx playwright install chromium

      - name: Run Assistant ERP smoke tests
        env:
          E2E_LOGIN: ${{ secrets.E2E_LOGIN }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          if [ -z "$E2E_LOGIN" ] || [ -z "$E2E_PASSWORD" ]; then
            echo "E2E_LOGIN / E2E_PASSWORD non configurés — smoke navigateur ignoré."
            exit 0
          fi
          npx playwright test tests/e2e/assistant-erp-smoke.spec.js tests/e2e/decision-center-smoke.spec.js --reporter=line
