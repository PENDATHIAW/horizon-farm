name: Horizon Farm E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL de preview Horizon Farm a tester'
        required: true
        default: 'https://horizon-farm-71b9kgzyd-pendathiaws-projects.vercel.app'

jobs:
  e2e:
    name: Playwright user journey
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url }}
          E2E_LOGIN: ${{ secrets.E2E_LOGIN }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JSON test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-json
          path: tests/results.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test media
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
