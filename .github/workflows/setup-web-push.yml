name: Setup Web Push

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lockfile:
    name: Install web-push and update lockfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/interconnexions-modules-riches-v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web-push
        run: npm install web-push@^3.6.7

      - name: Commit package lock updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update lockfile for web push"
          file_pattern: package.json package-lock.json
          branch: feature/interconnexions-modules-riches-v2

  generate-vapid-keys:
    name: Generate VAPID keys
    runs-on: ubuntu-latest
    steps:
      - name: Generate keys
        run: |
          npm exec --yes web-push generate-vapid-keys > vapid-keys.txt
          echo "## VAPID keys" >> $GITHUB_STEP_SUMMARY
          echo "Copie ces valeurs dans Vercel puis supprime/ignore ce run si tu veux éviter de garder la clé privée dans l'historique GitHub Actions." >> $GITHUB_STEP_SUMMARY
          echo '```txt' >> $GITHUB_STEP_SUMMARY
          cat vapid-keys.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload VAPID keys artifact
        uses: actions/upload-artifact@v4
        with:
          name: vapid-keys
          path: vapid-keys.txt
          retention-days: 1
