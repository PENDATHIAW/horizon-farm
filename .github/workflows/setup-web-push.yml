name: Setup Web Push

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-web-push:
    name: Setup dependency and generate VAPID keys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/interconnexions-modules-riches-v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-push and update package-lock
        run: npm install web-push@^3.6.7 --save

      - name: Commit package files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No package changes to commit."
          else
            git commit -m "chore: update lockfile for web push"
            git push origin HEAD:feature/interconnexions-modules-riches-v2
          fi

      - name: Generate VAPID keys
        run: |
          node - <<'NODE' > vapid-keys.txt
          const webpush = require('web-push');
          const keys = webpush.generateVAPIDKeys();
          console.log('Public Key:');
          console.log(keys.publicKey);
          console.log('');
          console.log('Private Key:');
          console.log(keys.privateKey);
          NODE
          echo "## VAPID keys" >> $GITHUB_STEP_SUMMARY
          echo "Copie ces valeurs dans Vercel. La clé privée ne doit jamais être mise dans le code." >> $GITHUB_STEP_SUMMARY
          echo '```txt' >> $GITHUB_STEP_SUMMARY
          cat vapid-keys.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload VAPID keys artifact
        uses: actions/upload-artifact@v4
        with:
          name: vapid-keys
          path: vapid-keys.txt
          retention-days: 1
