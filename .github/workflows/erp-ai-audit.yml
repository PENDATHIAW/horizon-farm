name: ERP AI Audit

on:
  pull_request:
  push:
    branches:
      - main
      - 'feature/*'

jobs:
  erp-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect fragile DOM patches
        run: |
          if grep -R -n -E "MutationObserver|SalesLabelCleaner|TreeWalker" src/; then
            echo "::error::Correction DOM fragile détectée. Corriger les libellés dans les composants sources."
            exit 1
          fi
          echo "OK — pas de MutationObserver dans src/"

      - name: Check architecture layer
        run: |
          test -f src/config/modules.config.js || (echo "::error::modules.config.js manquant" && exit 1)
          test -f src/services/moduleDataComposer.js || (echo "::error::moduleDataComposer.js manquant" && exit 1)
          test -f src/services/erpHealthEngine.js || (echo "::error::erpHealthEngine.js manquant" && exit 1)
          test -f src/services/workflowRefresh.js || (echo "::error::workflowRefresh.js manquant" && exit 1)
          test -f src/services/erpRules/index.js || (echo "::error::erpRules/index.js manquant" && exit 1)
          test -f lib/server/erp/audit.js || (echo "::error::lib/server/erp/audit.js manquant" && exit 1)
          test -f api/erp/\[action\].js || (echo "::error::api/erp/[action].js manquant" && exit 1)
          echo "OK — couche architecture présente"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Check Supabase migration file
        run: test -f supabase/migrations/20260529120000_create_ai_recommendations.sql

      - name: Run ERP audit API smoke test
        run: |
          node --input-type=module -e "
          try {
            const { computeErpAuditFindings } = await import('./src/services/erpRules/index.js');
            const findings = computeErpAuditFindings({
              stock: [{ id: 'S1', produit: 'Aliment', quantite: 2, seuil: 10 }],
              sales_orders: [{ id: 'V1', montant_total: 50000, statut_paiement: 'non_paye' }],
              finances: [{ id: 'F1', montant: 10000 }],
              taches: [{ id: 'T1', priority: 'critique', status: 'a_faire' }],
            });
            if (!findings.length) {
              console.warn('Audit smoke warning: no findings returned for synthetic data.');
            } else {
              console.log('Audit smoke OK:', findings.length, 'finding(s)');
            }
          } catch (error) {
            console.warn('Audit smoke warning:', error?.message || error);
          }
          "
